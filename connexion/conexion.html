<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">

<!-- Main Content Shell -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Login Card -->
<div class="glass-card rounded-[2.5rem] p-10 shadow-2xl transition-all duration-300">
<!-- Brand Identity Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="fitness_center">fitness_center</span>
</div>
<!-- Brand Casing Integrity: WakeUp -->
<h1 class="font-headline text-4xl font-black italic text-orange-600 tracking-tighter">WakeUp</h1>
<p class="font-label text-slate-500 text-xs font-semibold uppercase tracking-[0.2em] mt-2">Votre éveil commence ici</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all outline-none placeholder:text-slate-400 font-medium" id="email" placeholder="nom@exemple.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="password">Mot de passe</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#">Mot de passe oublié ?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all outline-none placeholder:text-slate-400 font-medium" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Se connecter</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login / Alt Action -->
<div class="mt-10">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute w-full h-[1px] bg-slate-200"></div>
<span class="relative bg-white px-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">ou continuer avec</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 bg-surface-container hover:bg-surface-container-high rounded-2xl transition-colors border border-outline-variant/10">

<span class="text-xs font-bold text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center py-3 bg-surface-container hover:bg-surface-container-high rounded-2xl transition-colors border border-outline-variant/10">
<span class="material-symbols-outlined text-on-surface-variant mr-2" data-icon="apple">ios</span>
<span class="text-xs font-bold text-on-surface-variant">Apple</span>

                    <a class="text-orange-600 font-bold hover:underline transition-all" href="#">S'inscrire</a>
</p>
</div>
</div>
<!-- Footer Note -->
<p class="mt-8 text-center text-white/60 text-[10px] font-bold uppercase tracking-widest">
